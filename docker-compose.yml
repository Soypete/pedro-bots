# Local testing only — secrets are injected by op run on the host.
#
# Usage:
#   op run --env-file=.env -- docker compose run --rm monitor
#   op run --env-file=.env -- docker compose run --rm suggest
#
# Or build + run in one step:
#   make monitor

services:
  monitor:
    build: .
    command: ["monitor"]
    environment:
      - REDDIT_CLIENT_ID
      - REDDIT_CLIENT_SECRET
      - REDDIT_USER_AGENT
      - DISCORD_BOT_TOKEN
      - DISCORD_CHANNEL_ID
      - DISCORD_NOTIFY_USER_ID
      - SUPABASE_URL
      - SUPABASE_SERVICE_KEY
      - LLAMA_CPP_BASE_URL
      - LLAMA_CPP_MODEL
      - MAX_POSTS_PER_SUBREDDIT
      - LOG_LEVEL

  suggest:
    build: .
    command: ["suggest"]
    environment:
      - REDDIT_CLIENT_ID
      - REDDIT_CLIENT_SECRET
      - REDDIT_USER_AGENT
      - DISCORD_BOT_TOKEN
      - DISCORD_CHANNEL_ID
      - DISCORD_NOTIFY_USER_ID
      - SUPABASE_URL
      - SUPABASE_SERVICE_KEY
      - LLAMA_CPP_BASE_URL
      - LLAMA_CPP_MODEL
      - MAX_POSTS_PER_SUBREDDIT
      - LOG_LEVEL
