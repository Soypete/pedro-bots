rules:
  # Rate-limit Reddit searches
  - name: rate-limit-reddit-search
    tools:
      - search_reddit_posts
    action: allow
    max_rate:
      count: 60
      window: 900  # 60 calls per 15 minutes

  # Rate-limit Discord — avoid duplicate/spam messages per run
  - name: rate-limit-discord
    tools:
      - send_discord_message
    action: allow
    max_rate:
      count: 3
      window: 3600  # max 3 messages per hour

  # Allow all DB tools freely — they're internal and fast
  - name: allow-db-tools
    tools:
      - load_active_topics
      - get_seen_post_ids
      - store_classification
      - get_interesting_posts
      - add_topic
    action: allow

default_deny: false