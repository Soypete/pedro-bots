apiVersion: batch/v1
kind: CronJob
metadata:
  name: redditwatch-monitor
  namespace: redditwatch
spec:
  # 08:00 Mountain Time (UTC-6 MST / UTC-7 MDT)
  schedule: "0 14 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  jobTemplate:
    spec:
      activeDeadlineSeconds: 3600  # kill job after 1h so hung runs never block the next schedule
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: redditwatch
              image: zot.local/redditwatch:latest
              command: ["--agent", "monitor"]
              envFrom:
                - secretRef:
                    name: redditwatch-secrets
                - configMapRef:
                    name: redditwatch-config
