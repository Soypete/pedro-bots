apiVersion: batch/v1
kind: CronJob
metadata:
  name: tweetwatch-monitor
  namespace: tweetwatch
spec:
  # 08:00, 13:00, 18:00 Mountain Time (UTC-6 MST / UTC-7 MDT)
  # Currently set for MST (UTC-6). Update to "0 15,20,1 * * *" during MDT.
  schedule: "0 14,19,0 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: tweetwatch
              image: registry.local/tweetwatch:latest
              command: ["--agent", "monitor"]
              envFrom:
                - secretRef:
                    name: tweetwatch-secrets
                - configMapRef:
                    name: tweetwatch-config
