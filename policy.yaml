# RedditWatch middleware policy
# Enforced on every tool call via middleware-py

rules:
  # Rate-limit Discord sends to prevent spam (max 3 per hour)
  - name: discord_rate_limit
    tools: [send_discord_message]
    action: allow
    max_rate:
      count: 3
      window: 3600

  # Read-only Reddit and DB tools — always allow
  - name: allow_read_tools
    tools:
      - search_reddit_posts
      - load_active_topics
      - get_seen_post_ids
      - get_interesting_posts
    action: allow

  # DB write — always allow
  - name: allow_db_write
    tools:
      - store_classification
      - add_topic
    action: allow

# Deny anything not explicitly listed above
default_deny: true
