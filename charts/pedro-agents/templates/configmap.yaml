apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "reddit-watcher.fullname" . }}-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "reddit-watcher.labels" . | nindent 4 }}
data:
  LLAMA_CPP_BASE_URL: {{ .Values.config.llamaCppBaseUrl | quote }}
  LLAMA_CPP_MODEL: {{ .Values.config.llamaCppModel | quote }}
  MAX_POSTS_PER_SUBREDDIT: {{ .Values.config.maxPostsPerQuery | quote }}
  LOG_LEVEL: {{ .Values.config.logLevel | quote }}
